services:
  mysql-db:
    image: mysql:8.0
    container_name: supply-chain-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-supply_chain}
      MYSQL_USER: ${MYSQL_USER:-supply_chain}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-supply_chain}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis-cache:
    image: redis:7.0-alpine
    container_name: supply-chain-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai_algorithms/supplychain-ai-service
      dockerfile: Dockerfile
    container_name: supply-chain-ai-service
    ports:
      - "${AI_SERVICE_PORT:-8081}:8000"
    volumes:
      - ./ai_algorithms/supplychain-ai-service/model:/app/model
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend-api:
    build:
      context: .
      dockerfile: backend_api/Dockerfile
    container_name: supply-chain-backend-api
    environment:
      APP_NAME: ${APP_NAME:-Supply Chain AI Backend}
      ENVIRONMENT: ${ENVIRONMENT:-docker}
      API_PREFIX: ${API_PREFIX:-/api/v1}
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-supply_chain}:${MYSQL_PASSWORD:-supply_chain}@mysql-db:3306/${MYSQL_DATABASE:-supply_chain}
      REDIS_URL: redis://redis-cache:6379/0
      AI_SERVICE_URL: http://ai-service:8000
      RISK_THRESHOLD: ${RISK_THRESHOLD:-0.85}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      mysql-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  frontend-dashboard:
    build:
      context: ./frontend_ui/frontend_ui_v1
      dockerfile: Dockerfile
    container_name: supply-chain-frontend-dashboard
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend-api:
        condition: service_healthy
    restart: unless-stopped

  data-replay:
    build:
      context: ./data_producer
      dockerfile: Dockerfile
    container_name: supply-chain-data-replay
    profiles:
      - replay
    environment:
      BACKEND_INGEST_URL: http://backend-api:8000/api/v1/stream/ingest
      REPLAY_RATE: ${REPLAY_RATE:-1}
    depends_on:
      backend-api:
        condition: service_healthy

volumes:
  mysql-data:
